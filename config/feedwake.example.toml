[openclaw]
wake_url = "http://127.0.0.1:18789/hooks/feed-wake"
token_env = "OPENCLAW_HOOK_TOKEN"
mode = "now"

[scan]
timeout_seconds = 10
max_items_per_feed = 30
max_response_bytes = 1048576
conditional_get = true

[[watchlist]]
symbol = "RELIANCE"
name = "Reliance Industries Limited"
isin = "INE002A01018"
aliases = ["Reliance Industries", "RIL"]

[[watchlist]]
symbol = "HDFCBANK"
name = "HDFC Bank Limited"
isin = "INE040A01034"
aliases = ["HDFC Bank"]

[[feeds]]
name = "NSE Announcements"
url = "https://nsearchives.nseindia.com/content/RSS/Online_announcements.xml"
source_type = "nse"
filter_profile = "exchange_watchlist"

# Copy the current Corporate Announcements RSS URL from:
# https://www.bseindia.com/rss-feed.html
# [[feeds]]
# name = "BSE Corporate Announcements"
# url = "https://www.bseindia.com/<copy-from-rss-page>"
# source_type = "bse"
# filter_profile = "exchange_watchlist"

[[feeds]]
name = "SEBI"
url = "https://www.sebi.gov.in/sebirss.xml"
source_type = "sebi"
filter_profile = "authority_passthrough"

[[feeds]]
name = "RBI Press Releases"
url = "https://rbi.org.in/pressreleases_rss.xml"
source_type = "rbi"
filter_profile = "authority_passthrough"

[[feeds]]
name = "Livemint Markets"
url = "https://www.livemint.com/rss/markets"
source_type = "media"
filter_profile = "media_high_precision"
user_agent = "Mozilla/5.0"

[exchange_filters]
category_allowlist = [
  "Financial Results",
  "Board Meeting",
  "Corporate Action",
  "Insider Trading",
  "Credit Rating",
  "Default",
  "Fund Raising",
  "Acquisition",
  "Litigation",
  "Order"
]

[media_filters]
require_watchlist_match = true
keyword_groups = [
  "results",
  "guidance",
  "merger",
  "acquisition",
  "stake sale",
  "fundraise",
  "default",
  "rating downgrade",
  "rating upgrade",
  "regulatory action",
  "tax demand",
  "large order",
  "management change"
]
exclude_keywords = [
  "sponsored",
  "lifestyle",
  "opinion",
  "explained",
  "personal finance"
]
